<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AI Chat Dock</title>
<style>
:root{--bg:#070b18;--card:rgba(15,23,42,.86);--line:rgba(148,163,184,.22);--text:#f8fafc;--muted:#94a3b8;--a:#8b5cf6;--b:#22d3ee;--danger:#fb7185;--ok:#34d399}*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 10% 0,rgba(139,92,246,.35),transparent 32rem),radial-gradient(circle at 90% 100%,rgba(34,211,238,.22),transparent 30rem),var(--bg);overflow:hidden}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{height:100%;display:grid;grid-template-columns:360px 1fr;gap:16px;padding:16px}.panel{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.35);backdrop-filter:blur(18px);overflow:hidden}.side{display:flex;flex-direction:column;min-height:0}.brand{padding:22px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:25px;letter-spacing:-.04em}.brand p{margin:8px 0 0;color:var(--muted);line-height:1.55;font-size:14px}.settings{padding:18px;overflow:auto}label{display:block;margin:14px 0 8px;font-size:13px;color:#dbeafe}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:rgba(2,6,23,.55);color:var(--text);padding:12px;outline:none}textarea{min-height:76px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:rgba(139,92,246,.8);box-shadow:0 0 0 4px rgba(139,92,246,.16)}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn{border:0;border-radius:14px;padding:11px 14px;color:#fff;background:linear-gradient(135deg,var(--a),var(--b));font-weight:700}.btn.secondary{background:rgba(148,163,184,.16);border:1px solid var(--line)}.btn.danger{background:rgba(251,113,133,.18);border:1px solid rgba(251,113,133,.35);color:#fecdd3}.btn:disabled{opacity:.55;cursor:not-allowed}.status{margin-top:12px;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.04);color:var(--muted);white-space:pre-wrap;font-size:13px;line-height:1.5}.hint{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.55}.main{display:grid;grid-template-rows:auto 1fr auto;min-width:0;min-height:0}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}.pill{display:inline-block;margin-left:8px;padding:6px 10px;border-radius:999px;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.24);color:#bbf7d0;font-size:12px}.messages{padding:18px;overflow:auto;display:flex;flex-direction:column;gap:14px}.msg{max-width:min(850px,92%);border:1px solid var(--line);border-radius:20px;padding:13px 15px;line-height:1.65;white-space:pre-wrap;word-break:break-word}.user{align-self:flex-end;background:linear-gradient(135deg,rgba(139,92,246,.32),rgba(34,211,238,.18))}.assistant{align-self:flex-start;background:rgba(15,23,42,.75)}.system{align-self:center;background:rgba(250,204,21,.08);color:#fde68a;font-size:13px}.meta{font-size:12px;color:var(--muted);margin-bottom:5px}.composer{padding:14px;border-top:1px solid var(--line);background:rgba(2,6,23,.18)}.attach{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px;color:var(--muted);font-size:13px}.file{display:inline-block;margin:0;border:1px dashed rgba(148,163,184,.4);border-radius:12px;padding:8px 10px;background:rgba(255,255,255,.04);color:var(--text)}.preview{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.preview img{width:70px;height:70px;object-fit:cover;border-radius:14px;border:1px solid var(--line)}.compose{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}#prompt{min-height:54px;max-height:180px}.mobile{display:none}@media(max-width:860px){body{overflow:auto}.app{height:auto;min-height:100%;grid-template-columns:1fr;padding:10px;gap:10px}.side{display:none}.side.open{display:flex;max-height:80vh}.mobile{display:inline-flex}.main{min-height:calc(100vh - 20px)}.messages{padding:12px}.top{padding:13px}.compose{grid-template-columns:1fr}.msg{max-width:96%}}
</style>
</head>
<body>
<div class="app">
  <aside class="panel side" id="side">
    <div class="brand"><h1>AI Chat Dock</h1><p>纯前端 OpenAI 兼容聊天页。输入 API Key 与主机地址，自动获取模型，并单独指定图片识别模型。</p></div>
    <div class="settings">
      <label>API 主机地址</label><input id="baseUrl" placeholder="例如 https://api.openai.com 或 https://openrouter.ai/api" />
      <label>API Key</label><input id="apiKey" type="password" placeholder="只保存在本机浏览器" />
      <div class="btns"><button class="btn" id="loadModels">获取模型</button><button class="btn secondary" id="saveSettings">保存设置</button></div>
      <label>主对话模型</label><select id="chatModel"><option value="">请先获取模型</option></select>
      <label>图片识别模型</label><select id="visionModel"><option value="">请先获取模型</option></select>
      <label>系统提示词</label><textarea id="systemPrompt">你是一个清晰、可靠、善于解释的 AI 助手。回答时尽量结构清楚，必要时给出步骤。</textarea>
      <div class="btns"><button class="btn secondary" id="exportChat">导出对话</button><button class="btn danger" id="clearChat">清空对话</button></div>
      <div class="status" id="status">尚未连接。填写 API 主机地址和 Key 后，点击“获取模型”。</div>
      <div class="hint">默认调用 OpenAI 兼容接口：GET /v1/models 与 POST /v1/chat/completions。若出现 CORS 错误，说明该 API 主机不允许浏览器直接访问，需要更换主机或增加后端代理。</div>
    </div>
  </aside>
  <main class="panel main">
    <div class="top"><div><strong>对话</strong><span class="pill" id="modelPill">未选择模型</span></div><button class="btn secondary mobile" id="toggleSettings">设置</button></div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <div class="attach"><label class="file">选择图片<input id="imageInput" type="file" accept="image/*" multiple hidden /></label><span id="imageInfo">未选择图片</span></div>
      <div class="preview" id="preview"></div>
      <div class="compose"><textarea id="prompt" placeholder="输入消息，Enter 发送，Shift + Enter 换行"></textarea><button class="btn" id="sendBtn">发送</button></div>
    </div>
  </main>
</div>
<script>
const $=id=>document.getElementById(id);const els={side:$('side'),baseUrl:$('baseUrl'),apiKey:$('apiKey'),chatModel:$('chatModel'),visionModel:$('visionModel'),systemPrompt:$('systemPrompt'),loadModels:$('loadModels'),saveSettings:$('saveSettings'),status:$('status'),messages:$('messages'),prompt:$('prompt'),sendBtn:$('sendBtn'),imageInput:$('imageInput'),imageInfo:$('imageInfo'),preview:$('preview'),clearChat:$('clearChat'),exportChat:$('exportChat'),modelPill:$('modelPill'),toggleSettings:$('toggleSettings')};let history=[];let selectedImages=[];
function base(){return (els.baseUrl.value||'').trim().replace(/\/+$/,'').replace(/\/v1$/,'')}function setStatus(t,ok=false){els.status.textContent=t;els.status.style.color=ok?'var(--ok)':'var(--muted)'}function saveLocal(){localStorage.setItem('ai-chat-dock-settings',JSON.stringify({baseUrl:els.baseUrl.value,apiKey:els.apiKey.value,chatModel:els.chatModel.value,visionModel:els.visionModel.value,systemPrompt:els.systemPrompt.value}))}function loadLocal(){try{const d=JSON.parse(localStorage.getItem('ai-chat-dock-settings')||'{}');els.baseUrl.value=d.baseUrl||'';els.apiKey.value=d.apiKey||'';els.systemPrompt.value=d.systemPrompt||els.systemPrompt.value;if(d.chatModel)fillSelects([d.chatModel,d.visionModel].filter(Boolean),d.chatModel,d.visionModel)}catch{}render()}function authHeaders(){return {'Content-Type':'application/json','Authorization':'Bearer '+els.apiKey.value.trim()}}async function api(path,opt={}){if(!base())throw new Error('请填写 API 主机地址。');if(!els.apiKey.value.trim())throw new Error('请填写 API Key。');const r=await fetch(base()+path,{...opt,headers:{...authHeaders(),...(opt.headers||{})}});const txt=await r.text();let data;try{data=txt?JSON.parse(txt):{}}catch{data={raw:txt}}if(!r.ok)throw new Error(data.error?.message||data.message||txt||('HTTP '+r.status));return data}
function fillSelects(models,chat,vision){const arr=[...new Set(models)].sort((a,b)=>a.localeCompare(b));for(const s of [els.chatModel,els.visionModel]){s.innerHTML='';for(const m of arr){const o=document.createElement('option');o.value=m;o.textContent=m;s.appendChild(o)}}if(chat&&arr.includes(chat))els.chatModel.value=chat;if(vision&&arr.includes(vision))els.visionModel.value=vision;updatePill()}
async function loadModels(){try{els.loadModels.disabled=true;setStatus('正在获取模型列表……');const d=await api('/v1/models',{method:'GET'});const models=(d.data||d.models||[]).map(x=>typeof x==='string'?x:x.id).filter(Boolean);if(!models.length)throw new Error('没有在接口返回中找到模型 id。');fillSelects(models,els.chatModel.value,els.visionModel.value);saveLocal();setStatus('已获取 '+models.length+' 个模型。',true)}catch(e){setStatus('获取模型失败：'+e.message+'\n\n常见原因：主机地址不对、Key 无效、不支持 /v1/models、或浏览器 CORS 被拦截。')}finally{els.loadModels.disabled=false}}
function bubble(role,text,persist=true){const d=document.createElement('div');d.className='msg '+role;const m=document.createElement('div');m.className='meta';m.textContent=role==='user'?'你':role==='assistant'?'AI':'系统';const b=document.createElement('div');b.textContent=text;d.append(m,b);els.messages.appendChild(d);if(persist)history.push({role,content:text});els.messages.scrollTop=els.messages.scrollHeight;return b}function render(){els.messages.innerHTML='';if(!history.length){bubble('system','欢迎使用 AI Chat Dock。先在设置里填写 API 信息并获取模型；上传图片时会先用图片识别模型生成说明，再交给主对话模型。',false);return}for(const m of history)bubble(m.role,m.content,false)}function updatePill(){els.modelPill.textContent=els.chatModel.value||'未选择模型'}function fileToDataUrl(f){return new Promise((ok,fail)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=fail;r.readAsDataURL(f)})}async function handleImages(files){selectedImages=[];els.preview.innerHTML='';const arr=Array.from(files||[]);els.imageInfo.textContent=arr.length?'已选择 '+arr.length+' 张图片':'未选择图片';for(const f of arr){if(!f.type.startsWith('image/'))continue;const url=await fileToDataUrl(f);selectedImages.push({name:f.name,dataUrl:url});const img=document.createElement('img');img.src=url;img.alt=f.name;els.preview.appendChild(img)}}async function analyzeImages(text){if(!selectedImages.length)return '';if(!els.visionModel.value)throw new Error('你上传了图片，但没有选择图片识别模型。');setStatus('正在调用图片识别模型……');const content=[{type:'text',text:'请详细识别这些图片内容，供后续对话使用。用户原始问题：'+(text||'无')}];for(const img of selectedImages)content.push({type:'image_url',image_url:{url:img.dataUrl}});const d=await api('/v1/chat/completions',{method:'POST',body:JSON.stringify({model:els.visionModel.value,messages:[{role:'user',content}],temperature:.2})});return d.choices?.[0]?.message?.content||d.choices?.[0]?.text||''}
async function send(){const text=els.prompt.value.trim();if(!text&&!selectedImages.length)return;if(!els.chatModel.value){setStatus('请先选择主对话模型。');return}els.sendBtn.disabled=true;bubble('user',(text||'[图片]')+(selectedImages.length?'\n\n已附加图片：'+selectedImages.map(x=>x.name).join('，'):''));els.prompt.value='';const out=bubble('assistant','正在思考……',false);try{let imageReport='';if(selectedImages.length)imageReport=await analyzeImages(text);const messages=[];if(els.systemPrompt.value.trim())messages.push({role:'system',content:els.systemPrompt.value.trim()});for(const m of history.slice(-20))messages.push({role:m.role,content:m.content});let finalText=text;if(imageReport)finalText+='\n\n[图片识别结果]\n'+imageReport;messages.push({role:'user',content:finalText});setStatus('正在调用主对话模型……');const d=await api('/v1/chat/completions',{method:'POST',body:JSON.stringify({model:els.chatModel.value,messages,temperature:.7})});const reply=d.choices?.[0]?.message?.content||d.choices?.[0]?.text||'(模型没有返回文本)';out.textContent=reply;history.push({role:'assistant',content:reply});selectedImages=[];els.imageInput.value='';els.preview.innerHTML='';els.imageInfo.textContent='未选择图片';saveLocal();setStatus('完成。',true)}catch(e){out.textContent='请求失败：'+e.message;history.push({role:'assistant',content:out.textContent});setStatus('请求失败：'+e.message)}finally{els.sendBtn.disabled=false}}
els.loadModels.onclick=loadModels;els.saveSettings.onclick=()=>{saveLocal();setStatus('设置已保存到本机浏览器。',true)};els.chatModel.onchange=()=>{updatePill();saveLocal()};els.visionModel.onchange=saveLocal;els.systemPrompt.onchange=saveLocal;els.imageInput.onchange=e=>handleImages(e.target.files);els.sendBtn.onclick=send;els.prompt.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};els.toggleSettings.onclick=()=>els.side.classList.toggle('open');els.clearChat.onclick=()=>{if(confirm('确定清空当前对话吗？')){history=[];render()}};els.exportChat.onclick=()=>{const blob=new Blob([JSON.stringify(history,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='ai-chat-dock-history.json';a.click();URL.revokeObjectURL(url)};loadLocal();
</script>
</body>
</html>
