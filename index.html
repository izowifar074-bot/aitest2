<style>
:root{--bg:#f7f4ed;--bg2:#eef7f2;--card:rgba(255,255,252,.88);--card2:#fffefa;--line:#e8e0d4;--text:#26211d;--muted:#82766b;--soft:#f2ede5;--green:#5f8f72;--green2:#e8f3eb;--amber:#b98354;--amber2:#f4dfc9;--danger:#b15f66;--shadow:0 20px 60px rgba(95,76,55,.12)}*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 92% 6%,rgba(196,229,211,.78),transparent 28rem),radial-gradient(circle at 6% 92%,rgba(244,223,201,.66),transparent 30rem),linear-gradient(135deg,var(--bg),var(--bg2));overflow:hidden}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{height:100%;display:grid;grid-template-columns:360px 1fr;gap:18px;padding:18px}.panel{background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);backdrop-filter:blur(16px);overflow:hidden}.side{display:flex;flex-direction:column;min-height:0}.brand{padding:22px 22px 20px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.76),rgba(232,243,235,.7))}.brandTop{display:flex;align-items:center;justify-content:space-between;gap:12px}h1{margin:0;font-size:25px;letter-spacing:-.04em}.brand p{margin:10px 0 0;color:var(--muted);line-height:1.55;font-size:14px}.settings{padding:18px;overflow:auto}label{display:block;margin:14px 0 8px;font-size:13px;color:#6f624f}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.72);color:var(--text);padding:12px 13px;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.75)}textarea{min-height:78px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:rgba(95,143,114,.78);box-shadow:0 0 0 4px rgba(95,143,114,.14)}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn{border:0;border-radius:999px;padding:11px 16px;color:#fff;background:linear-gradient(135deg,var(--green),#7dae8b);font-weight:750;box-shadow:0 8px 22px rgba(95,143,114,.20)}.btn.secondary,.mini{background:rgba(255,255,255,.72);border:1px solid var(--line);color:var(--text);box-shadow:none}.btn.danger{background:rgba(177,95,102,.12);border:1px solid rgba(177,95,102,.24);color:#8a3e45;box-shadow:none}.btn:disabled{opacity:.55;cursor:not-allowed}.status{margin-top:12px;padding:11px 13px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.58);color:var(--muted);white-space:pre-wrap;font-size:13px;line-height:1.55}.hint{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.55}.main{display:grid;grid-template-rows:auto 1fr auto;min-width:0;min-height:0}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:17px 20px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.58)}.pill{display:inline-block;margin-left:8px;padding:6px 10px;border-radius:999px;background:var(--green2);border:1px solid rgba(95,143,114,.22);color:#3f7758;font-size:12px}.messages{padding:20px;overflow:auto;display:flex;flex-direction:column;gap:15px}.msg{max-width:min(850px,92%);border:1px solid var(--line);border-radius:24px;padding:14px 16px;line-height:1.68;white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,.72);box-shadow:0 14px 36px rgba(95,76,55,.08)}.user{align-self:flex-end;background:linear-gradient(135deg,#edf7f0,#fffefa)}.assistant{align-self:flex-start;background:rgba(255,255,255,.82)}.system{align-self:center;background:rgba(255,250,238,.86);color:#7c623d;font-size:13px}.ocr{align-self:flex-start;background:rgba(232,243,235,.72);color:#44594b}.meta{font-size:12px;color:var(--muted);margin-bottom:6px}.time{margin-top:10px;color:var(--muted);font-size:12px}.composer{padding:14px;border-top:1px solid var(--line);background:rgba(255,255,255,.42)}.attach{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px;color:var(--muted);font-size:13px}.file{display:inline-block;margin:0;border:1px dashed #cfc4b6;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.72);color:var(--text)}.mini{border-radius:999px;padding:7px 10px;font-size:12px}.preview{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:10px}.thumb{position:relative;width:74px;height:74px}.thumb img{width:74px;height:74px;object-fit:cover;border-radius:18px;border:1px solid var(--line)}.thumb button{position:absolute;right:-7px;top:-7px;width:24px;height:24px;border-radius:50%;border:1px solid rgba(177,95,102,.38);background:#fff2f2;color:#8a3e45;font-weight:800}.compose{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}#prompt{min-height:54px;max-height:180px}.reason{margin:4px 0 12px;border:1px solid #e2dacd;border-radius:18px;background:#f6f1e9;overflow:hidden}.reason summary{cursor:pointer;user-select:none;padding:9px 12px;color:#746554;font-size:13px}.reason .mathout{margin:0;padding:0 12px 12px;white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.58;color:#7c746a}.reason.live .mathout{max-height:118px;overflow:hidden;position:relative}.reason.live .mathout:before{content:"";position:absolute;left:0;right:0;top:0;height:18px;background:linear-gradient(to bottom,#f6f1e9,rgba(246,241,233,0));pointer-events:none}.answer{white-space:pre-wrap}.mobile{display:none}mjx-container{overflow-x:auto;overflow-y:hidden;max-width:100%}@media(max-width:860px){body{overflow:auto}.app{height:auto;min-height:100%;grid-template-columns:1fr;padding:10px;gap:10px}.side{display:none}.mobile{display:inline-flex}.main{min-height:calc(100vh - 20px)}.messages{padding:12px}.top{padding:13px}.compose{grid-template-columns:1fr}.msg{max-width:96%}.app.settings-mode .side{display:flex;min-height:calc(100vh - 20px);max-height:none}.app.settings-mode .main{display:none}.app.settings-mode{min-height:100vh}.settings{padding-bottom:28px}}
</style>

<body>
<div class="app" id="app">
<aside class="panel side" id="side"><div class="brand"><div class="brandTop"><h1>AI Chat Dock</h1><button class="btn secondary mobile" id="backChat" type="button">返回对话</button></div><p>清新卡片式 AI 聊天页。默认配置 DashScope 国际站与 Qwen 模型，可自行覆盖。</p></div><div class="settings">
<label>API 主机地址</label><input id="baseUrl" placeholder="https://dashscope-intl.aliyuncs.com/compatible-mode/v1" />
<label>API Key</label><input id="apiKey" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="可直接粘贴 API Key，只保存在本机浏览器" />
<div class="btns"><button class="btn" id="loadModels">获取模型</button><button class="btn secondary" id="saveSettings">保存设置</button></div>
<label>主对话模型</label><select id="chatModel"></select>
<label>图片识别模型</label><select id="visionModel"></select>
<label>系统提示词</label><textarea id="systemPrompt">你是一个清晰、可靠、善于解释的 AI 助手。回答时尽量结构清楚，必要时给出步骤。涉及数学公式时，优先使用 \(...\) 表示行内公式，使用 \[...\] 或 $$...$$ 表示独立公式；如果已有内容使用 $...$，也可以保留。</textarea>
<div class="btns"><button class="btn secondary" id="exportChat">导出对话</button><button class="btn danger" id="clearChat">清空对话</button></div>
<div class="status" id="status">已填入默认 API 主机和 Qwen 模型。填写 API Key 后即可使用；也可以点击“获取模型”刷新模型列表。</div>
<div class="hint">生成时只显示最新几行思考过程；完成后完整思考链会折叠保存，点击即可展开。已支持 $...$、\(...\)、\[...\]、$$...$$ 公式渲染。</div>
</div></aside>
<main class="panel main"><div class="top"><div><strong>对话</strong><span class="pill" id="modelPill">未选择模型</span></div><button class="btn secondary mobile" id="toggleSettings">设置</button></div><div class="messages" id="messages"></div><div class="composer"><div class="attach"><label class="file">选择图片<input id="imageInput" type="file" accept="image/*" multiple hidden /></label><span id="imageInfo">未选择图片</span><button class="mini" id="clearImages" type="button">清空图片</button></div><div class="preview" id="preview"></div><div class="compose"><textarea id="prompt" placeholder="输入消息，Enter 发送，Shift + Enter 换行"></textarea><button class="btn" id="sendBtn">发送</button></div></div></main>
</div>
<script>
const DEFAULTS={baseUrl:'https://dashscope-intl.aliyuncs.com/compatible-mode/v1',chatModel:'qwen3.7-max',visionModel:'qwen-vl-ocr-2025-11-20'};
const OLD_DEFAULT_VISION='qwen3.6-plus';
const $=id=>document.getElementById(id);const els={app:$('app'),side:$('side'),baseUrl:$('baseUrl'),apiKey:$('apiKey'),chatModel:$('chatModel'),visionModel:$('visionModel'),systemPrompt:$('systemPrompt'),loadModels:$('loadModels'),saveSettings:$('saveSettings'),status:$('status'),messages:$('messages'),prompt:$('prompt'),sendBtn:$('sendBtn'),imageInput:$('imageInput'),imageInfo:$('imageInfo'),preview:$('preview'),clearImages:$('clearImages'),clearChat:$('clearChat'),exportChat:$('exportChat'),modelPill:$('modelPill'),toggleSettings:$('toggleSettings'),backChat:$('backChat')};let history=[];let selectedImages=[];
function tailText(text,maxLines=5,maxChars=520){const t=(text||'').trim();if(!t)return'正在思考……';const lines=t.split(/\r?\n/);let tail=lines.slice(-maxLines).join('\n').trim();if(tail.length>maxChars)tail='…'+tail.slice(-maxChars);return tail||'正在思考……'}
function renderMath(node,retry=0){if(!node)return;if(window.MathJax&&MathJax.typesetPromise){try{if(MathJax.typesetClear)MathJax.typesetClear([node]);MathJax.typesetPromise([node]).then(scroll).catch(()=>{})}catch{}}else if(retry<30){setTimeout(()=>renderMath(node,retry+1),150)}}
function base(){return (els.baseUrl.value||'').trim().replace(/\/+$/,'').replace(/\/v1$/,'')}function setStatus(t,ok=false){els.status.textContent=t;els.status.style.color=ok?'var(--green)':'var(--muted)'}function saveLocal(){localStorage.setItem('ai-chat-dock-settings',JSON.stringify({baseUrl:els.baseUrl.value,apiKey:els.apiKey.value,chatModel:els.chatModel.value,visionModel:els.visionModel.value,systemPrompt:els.systemPrompt.value}))}function loadLocal(){try{const raw=localStorage.getItem('ai-chat-dock-settings');const d=raw?JSON.parse(raw):{};els.baseUrl.value=d.baseUrl||DEFAULTS.baseUrl;els.apiKey.value=d.apiKey||'';els.systemPrompt.value=d.systemPrompt||els.systemPrompt.value;const chat=d.chatModel||DEFAULTS.chatModel;const vision=(!d.visionModel||d.visionModel===OLD_DEFAULT_VISION)?DEFAULTS.visionModel:d.visionModel;fillSelects([chat,vision],chat,vision)}catch{els.baseUrl.value=DEFAULTS.baseUrl;fillSelects([DEFAULTS.chatModel,DEFAULTS.visionModel],DEFAULTS.chatModel,DEFAULTS.visionModel)}render()}function authHeaders(extra={}){return {'Content-Type':'application/json','Authorization':'Bearer '+els.apiKey.value.trim(),...extra}}async function api(path,opt={}){if(!base())throw new Error('请填写 API 主机地址。');if(!els.apiKey.value.trim())throw new Error('请填写 API Key。');const r=await fetch(base()+path,{...opt,headers:{...authHeaders(),...(opt.headers||{})}});const txt=await r.text();let data;try{data=txt?JSON.parse(txt):{}}catch{data={raw:txt}}if(!r.ok)throw new Error(data.error?.message||data.message||txt||('HTTP '+r.status));return data}
function fillSelects(models,chat,vision){const arr=[...new Set([...(models||[]),chat,vision].filter(Boolean))].sort((a,b)=>a.localeCompare(b));for(const s of [els.chatModel,els.visionModel]){s.innerHTML='';for(const m of arr){const o=document.createElement('option');o.value=m;o.textContent=m;s.appendChild(o)}}els.chatModel.value=chat||arr[0]||'';els.visionModel.value=vision||arr[0]||'';updatePill()}
async function loadModels(){try{els.loadModels.disabled=true;setStatus('正在获取模型列表……');const d=await api('/v1/models',{method:'GET'});const models=(d.data||d.models||[]).map(x=>typeof x==='string'?x:x.id).filter(Boolean);if(!models.length)throw new Error('没有在接口返回中找到模型 id。');fillSelects(models,els.chatModel.value||DEFAULTS.chatModel,els.visionModel.value||DEFAULTS.visionModel);saveLocal();setStatus('已获取 '+models.length+' 个模型。',true)}catch(e){setStatus('获取模型失败：'+e.message+'\n\n可先直接使用默认模型，或检查 Key、主机地址、模型名和 CORS。')}finally{els.loadModels.disabled=false}}
function fmt(ms){return (ms/1000).toFixed(1)+' 秒'}function scroll(){els.messages.scrollTop=els.messages.scrollHeight}function bubble(role,text,persist=true){const d=document.createElement('div');d.className='msg '+role;const m=document.createElement('div');m.className='meta';m.textContent=role==='user'?'你':role==='assistant'?'AI':role==='ocr'?'图片 OCR / 识别':'系统';const b=document.createElement('div');b.textContent=text;d.append(m,b);els.messages.appendChild(d);renderMath(b);if(persist)history.push({role,content:text});scroll();return b}function render(){els.messages.innerHTML='';if(!history.length){bubble('system','欢迎使用 AI Chat Dock。默认主机与 Qwen 模型已填好；输入 API Key 后即可开始。支持数学公式渲染。',false);return}for(const m of history)bubble(m.role,m.content,false)}function updatePill(){els.modelPill.textContent=els.chatModel.value||'未选择模型'}
function makeAssistantCard(){const d=document.createElement('div');d.className='msg assistant';const meta=document.createElement('div');meta.className='meta';meta.textContent='AI';const reason=document.createElement('details');reason.className='reason live';reason.open=true;const sum=document.createElement('summary');sum.textContent='思考中（仅显示最新几行）';const pre=document.createElement('div');pre.className='mathout';pre.textContent='正在思考……';reason.append(sum,pre);const answer=document.createElement('div');answer.className='answer';answer.textContent='';const time=document.createElement('div');time.className='time';d.append(meta,reason,answer,time);els.messages.appendChild(d);scroll();return{reason,sum,pre,answer,time}}
function makeOcrCard(){const d=document.createElement('div');d.className='msg ocr';const meta=document.createElement('div');meta.className='meta';meta.textContent='图片 OCR / 识别';const detail=document.createElement('details');detail.className='reason live';detail.open=true;const sum=document.createElement('summary');sum.textContent='图片识别中……';const pre=document.createElement('div');pre.className='mathout';pre.textContent='正在调用图片识别模型……';detail.append(sum,pre);const time=document.createElement('div');time.className='time';d.append(meta,detail,time);els.messages.appendChild(d);scroll();return{detail,sum,pre,time}}
function setAssistantDone(card,reasoning,answer,elapsed){card.reason.classList.remove('live');if(reasoning.trim()){card.pre.textContent=reasoning.trim();card.reason.open=false;card.sum.textContent='完整思考过程（已折叠，点击展开）';renderMath(card.pre)}else{card.reason.style.display='none'}card.answer.textContent=answer||'(模型没有返回文本)';renderMath(card.answer);card.time.textContent='思考用时：'+fmt(elapsed);scroll()}function extractThink(text){const m=(text||'').match(/<think>([\s\S]*?)<\/think>/i);if(!m)return{reasoning:'',answer:text||''};return{reasoning:m[1].trim(),answer:(text||'').replace(m[0],'').trim()}}
function fileToDataUrl(f){return new Promise((ok,fail)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=fail;r.readAsDataURL(f)})}async function handleImages(files){for(const f of Array.from(files||[])){if(!f.type.startsWith('image/'))continue;selectedImages.push({id:Date.now()+Math.random(),name:f.name,dataUrl:await fileToDataUrl(f)})}els.imageInput.value='';renderImages()}function renderImages(){els.preview.innerHTML='';els.imageInfo.textContent=selectedImages.length?'已选择 '+selectedImages.length+' 张图片':'未选择图片';for(const img of selectedImages){const w=document.createElement('div');w.className='thumb';const im=document.createElement('img');im.src=img.dataUrl;im.alt=img.name;const x=document.createElement('button');x.type='button';x.textContent='×';x.onclick=()=>{selectedImages=selectedImages.filter(v=>v.id!==img.id);renderImages()};w.append(im,x);els.preview.appendChild(w)}}function clearImages(){selectedImages=[];els.imageInput.value='';renderImages()}
async function analyzeImages(text){if(!selectedImages.length)return '';if(!els.visionModel.value)throw new Error('你上传了图片，但没有选择图片识别模型。');const start=performance.now();const ocrCard=makeOcrCard();setStatus('正在调用图片识别模型……');const content=[{type:'text',text:'请详细识别这些图片内容，尽量保留可见文字、题目条件、图表关系和关键信息，供后续主模型回答使用。用户原始问题：'+(text||'无')}];for(const img of selectedImages)content.push({type:'image_url',image_url:{url:img.dataUrl}});try{const d=await api('/v1/chat/completions',{method:'POST',body:JSON.stringify({model:els.visionModel.value,messages:[{role:'user',content}],temperature:.2})});const out=d.choices?.[0]?.message?.content||d.choices?.[0]?.text||'';ocrCard.detail.classList.remove('live');ocrCard.pre.textContent=out||'(图片识别模型没有返回文本)';renderMath(ocrCard.pre);ocrCard.detail.open=false;ocrCard.sum.textContent='图片 OCR / 识别结果（已折叠，点击展开）';ocrCard.time.textContent='OCR/识别用时：'+fmt(performance.now()-start);scroll();return out}catch(e){ocrCard.detail.classList.remove('live');ocrCard.pre.textContent='图片识别失败：'+e.message;ocrCard.sum.textContent='图片 OCR / 识别失败';ocrCard.time.textContent='OCR/识别用时：'+fmt(performance.now()-start);throw e}}
async function chatNormal(messages){const d=await api('/v1/chat/completions',{method:'POST',body:JSON.stringify({model:els.chatModel.value,messages,temperature:.7})});const msg=d.choices?.[0]?.message||{};let reasoning=msg.reasoning_content||msg.reasoning||d.choices?.[0]?.reasoning_content||'';let answer=msg.content||d.choices?.[0]?.text||'';if(!reasoning&&/<think>/i.test(answer)){const p=extractThink(answer);reasoning=p.reasoning;answer=p.answer}return{reasoning,answer}}
async function chatStream(messages,card){if(!base())throw new Error('请填写 API 主机地址。');if(!els.apiKey.value.trim())throw new Error('请填写 API Key。');const r=await fetch(base()+'/v1/chat/completions',{method:'POST',headers:authHeaders({'Accept':'text/event-stream'}),body:JSON.stringify({model:els.chatModel.value,messages,temperature:.7,stream:true})});if(!r.ok||!r.body){const txt=await r.text();throw new Error(txt||('HTTP '+r.status))}const reader=r.body.getReader();const decoder=new TextDecoder('utf-8');let buf='',reasoning='',answer='',contentAll='';function apply(){if(reasoning){card.pre.textContent=tailText(reasoning);card.sum.textContent='思考中（仅显示最新几行）';card.reason.style.display='block'}card.answer.textContent=answer||'正在思考……';scroll()}while(true){const {done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});const lines=buf.split(/\r?\n/);buf=lines.pop()||'';for(const line of lines){const s=line.trim();if(!s||!s.startsWith('data:'))continue;const payload=s.slice(5).trim();if(payload==='[DONE]')return{reasoning,answer};let data;try{data=JSON.parse(payload)}catch{continue}const delta=data.choices?.[0]?.delta||{};const msg=data.choices?.[0]?.message||{};const rc=delta.reasoning_content||delta.reasoning||msg.reasoning_content||'';const c=delta.content||msg.content||data.choices?.[0]?.text||'';if(rc){reasoning+=rc}else if(c){contentAll+=c;if(!reasoning&&/<think>/i.test(contentAll)){if(/<\/think>/i.test(contentAll)){const p=extractThink(contentAll);reasoning=p.reasoning;answer=p.answer}else{card.pre.textContent=tailText(contentAll.replace(/<think>/i,''));card.answer.textContent='正在思考……';scroll();continue}}else{answer+=c}}apply()}}return{reasoning,answer}}
async function send(){const text=els.prompt.value.trim();if(!text&&!selectedImages.length)return;if(!els.chatModel.value){setStatus('请先选择主对话模型。');return}els.sendBtn.disabled=true;bubble('user',(text||'[图片]')+(selectedImages.length?'\n\n已附加图片：'+selectedImages.map(x=>x.name).join('，'):''));els.prompt.value='';const card=makeAssistantCard();const start=performance.now();try{let imageReport='';if(selectedImages.length)imageReport=await analyzeImages(text);const messages=[];if(els.systemPrompt.value.trim())messages.push({role:'system',content:els.systemPrompt.value.trim()});for(const m of history.slice(-20)){if(m.role==='user'||m.role==='assistant')messages.push({role:m.role,content:m.content})}let finalText=text;if(imageReport)finalText+='\n\n[图片 OCR / 识别结果]\n'+imageReport;messages.push({role:'user',content:finalText});setStatus('正在调用主对话模型……');let result;try{result=await chatStream(messages,card)}catch(streamErr){setStatus('流式请求失败，正在退回普通请求……\n'+streamErr.message);result=await chatNormal(messages)}if(!result.reasoning&&/<think>/i.test(result.answer)){const p=extractThink(result.answer);result.reasoning=p.reasoning;result.answer=p.answer}setAssistantDone(card,result.reasoning||'',result.answer||'',performance.now()-start);history.push({role:'assistant',content:result.answer||''});clearImages();saveLocal();setStatus('完成。',true)}catch(e){setAssistantDone(card,'','请求失败：'+e.message,performance.now()-start);history.push({role:'assistant',content:'请求失败：'+e.message});setStatus('请求失败：'+e.message)}finally{els.sendBtn.disabled=false}}
els.loadModels.onclick=loadModels;els.saveSettings.onclick=()=>{saveLocal();setStatus('设置已保存到本机浏览器。',true)};els.chatModel.onchange=()=>{updatePill();saveLocal()};els.visionModel.onchange=saveLocal;els.systemPrompt.onchange=saveLocal;els.imageInput.onchange=e=>handleImages(e.target.files);els.clearImages.onclick=clearImages;els.sendBtn.onclick=send;els.prompt.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};els.toggleSettings.onclick=()=>els.app.classList.add('settings-mode');els.backChat.onclick=()=>els.app.classList.remove('settings-mode');els.clearChat.onclick=()=>{if(confirm('确定清空当前对话吗？')){history=[];render()}};els.exportChat.onclick=()=>{const blob=new Blob([JSON.stringify(history,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='ai-chat-dock-history.json';a.click();URL.revokeObjectURL(url)};loadLocal();
</script>
