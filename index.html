<div class="app" id="app">
<aside class="panel side" id="side"><div class="brand"><div class="brandTop"><h1>Mozhi AIchat</h1><button class="btn secondary mobile" id="backChat" type="button">返回对话</button></div><p>默认主机为 DashScope。请先填写 API Key。</p></div><div class="settings">
<label>API 主机地址（主对话）</label><input id="baseUrl" placeholder="https://dashscope-intl.aliyuncs.com/compatible-mode/v1" />
<label>API Key（主对话）</label><input id="apiKey" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="请先填写 API Key" />
<div class="btns"><button class="btn" id="loadModels">获取模型</button><button class="btn secondary" id="saveSettings">保存设置</button></div>
<label>主对话模型</label><select id="chatModel"></select>
<label>OCR API 主机地址</label><input id="ocrBaseUrl" placeholder="https://dashscope-intl.aliyuncs.com/compatible-mode/v1" />
<label>OCR API Key（可选）</label><input id="ocrApiKey" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="留空则使用上方 API Key" />
<label>图片识别模型</label><select id="visionModel"></select>
<label>系统提示词</label><textarea id="systemPrompt">你是一个清晰、可靠、善于解释的 AI 助手。回答时尽量结构清楚，必要时给出步骤。涉及数学公式时，优先使用 \(...\) 表示行内公式，使用 \[...\] 或 $$...$$ 表示独立公式；如果已有内容使用 $...$，也可以保留。</textarea>
<label class="modeBox"><input id="englishMode" type="checkbox" /><span>是否启用英语阅读处理模式<small>勾选后会在后台注入专用长提示词；不会在页面中展示全文。</small></span></label>
<div class="btns"><button class="btn secondary" id="exportChat">导出对话</button><button class="btn danger" id="clearChat">清空对话</button></div>
<div class="status" id="status">请先填写 API Key。上传图片后，当前已选择图片会在发送时立即清空。</div>
<div class="hint">默认主对话：DashScope / qwen3.7-max。默认 OCR：DashScope / qwen3.6-plus。</div>
</div></aside>
<main class="panel main"><div class="top"><div><strong>对话</strong><span class="pill" id="modelPill">未选择模型</span></div><button class="btn secondary mobile" id="toggleSettings">设置</button></div><div class="messages" id="messages"></div><div class="composer"><div class="attach"><label class="file">选择图片<input id="imageInput" type="file" accept="image/*" multiple hidden /></label><span id="imageInfo">未选择图片</span><button class="mini" id="clearImages" type="button">清空图片</button></div><div class="preview" id="preview"></div><div class="compose"><textarea id="prompt" placeholder="输入消息，Enter 发送，Shift + Enter 换行"></textarea><button class="btn" id="sendBtn">发送</button></div></div></main>

const DEFAULTS={baseUrl:'https://dashscope-intl.aliyuncs.com/compatible-mode/v1',ocrBaseUrl:'https://dashscope-intl.aliyuncs.com/compatible-mode/v1',chatModel:'qwen3.7-max',visionModel:'qwen3.6-plus'};

先判断题型。如果图片中包含多种题型，请分题型依次处理。

题型三：第二部分 Section A，15 题四选一阅读

题型四：第二部分 Section B，A / B / C 篇理解性选择题阅读
识别标准：通常每篇文章后有 4 道选择题，这是关键判断标准；属于常规阅读理解题。
输出内容：每篇先给出题号和答案。每道题都要给出“解答溯源”，即说明答案来自原文哪一句、哪一段或哪一处信息。必要时，你可以输出全部原文，然后加粗一部分以展示溯源。对每道题给出简思，重点说明题型、原文依据、为什么正确选项成立、干扰项主要错在哪里。回答最后列出 10—20 个本篇文章困难且重要的单词或短语。
额外任务定位规则：如果上传图片或 PDF 中还包含阅读题之外的其他内容，例如词组翻译、句子翻译、划线词解释、原文匹配题、段落匹配题等，请额外列出：题目内容或关键词；它在原文中的位置，例如第几段、第几句、某个关键词附近；对应的原文依据；简要说明为什么定位到这里。必要时，你可以完整输出原文，并加粗部分以展示溯源。
回答风格要求：不要写成冗长讲义。简思宁可短，也不要空泛。`;

llSelects([chat,vision],chat,vision)}catch{els.baseUrl.value=DEFAULTS.baseUrl;els.ocrBaseUrl.value=DEFAULTS.ocrBaseUrl;fillSelects([DEFAULTS.chatModel,DEFAULTS.visionModel],DEFAULTS.chatModel,DEFAULTS.visionModel)}render()}function authHeaders(extra={},key){return{'Content-Type':'application/json','Authorization':'Bearer '+(key??els.apiKey.value.trim()),...extra}}async function api(path,opt={},targetBase=null,targetKey=null){const b=targetBase||base(),k=targetKey??els.apiKey.value.trim();if(!b)throw new Error('请填写 API 主机地址。');if(!k)throw new Error('请填写 API Key。');const r=await fetch(b+path,{...opt,headers:{...authHeaders({},k),...(opt.headers||{})}});const txt=await r.text();let data;try{data=txt?JSON.parse(txt):{}}catch{data={raw:txt}}if(!r.ok)throw new Error(data.error?.message||data.message||txt||('HTTP '+r.status));return data}function fillSelects(models,chat,vision){const arr=[...new Set([...(models||[]),chat,vision].filter(Boolean))].sort((a,b)=>a.localeCompare(b));for(const s of[els.chatModel,els.visionModel]){s.innerHTML='';for(const m of arr){const o=document.createElement('option');o.value=m;o.textContent=m;s.appendChild(o)}}els.chatModel.value=chat||arr[0]||'';els.visionModel.value=vision||arr[0]||'';updatePill()}async function loadModels(){try{els.loadModels.disabled=true;setStatus('正在获取主对话模型列表……');const d=await api('/v1/models',{method:'GET'});const models=(d.data||d.models||[]).map(x=>typeof x==='string'?x:x.id).filter(Boolean);if(!models.length)throw new Error('没有在接口返回中找到模型 id。');fillSelects(models,els.chatModel.value||DEFAULTS.chatModel,els.visionModel.value||DEFAULTS.visionModel);saveLocal();setStatus('已获取 '+models.length+' 个主对话模型。',true)}catch(e){setStatus('获取模型失败：'+e.message+'\n\n请先确认 API Key、主机地址和模型名是否正确。')}finally{els.loadModels.disabled=false}}function fmt(ms){return(ms/1000).toFixed(1)+' 秒'}function scroll(){els.messages.scrollTop=els.messages.scrollHeight}function bubble(role,text,persist=true){const d=document.createElement('div');d.className='msg '+role;const m=document.createElement('div');m.className='meta';m.textContent=role==='user'?'你':role==='assistant'?'AI':role==='ocr'?'图片 OCR / 识别':'系统';const b=document.createElement('div');b.textContent=text;d.append(m,b);els.messages.appendChild(d);renderMath(b);if(persist)history.push({role,content:text});scroll();return b}function render(){els.messages.innerHTML='';if(!history.length){bubble('system','请先在设置中填写 API Key。上传图片后，当前已选择图片会在发送时立即清空。',false);return}for(const m of history)bubble(m.role,m.content,false)}function updatePill(){els.modelPill.textContent=els.chatModel.value||'未选择模型'}function makeAssistantCard(){const d=document.createElement('div');d.className='msg assistant';const meta=document.createElement('div');meta.className='meta';meta.textContent='AI';const reason=document.createElement('details');reason.className='reason live';reason.open=true;const sum=document.createElement('summary');sum.textContent='思考中（仅显示最新几行）';const pre=document.createElement('div');pre.className='mathout';pre.textContent='正在思考……';reason.append(sum,pre);const answer=document.createElement('div');answer.className='answer';const time=document.createElement('div');time.className='time';d.append(meta,reason,answer,time);els.messages.appendChild(d);scroll();return{reason,sum,pre,answer,time}}function makeOcrCard(){const d=document.createElement('div');d.className='msg ocr';const meta=document.createElement('div');meta.className='meta';meta.textContent='图片 OCR / 识别';const detail=document.createElement('details');detail.className='reason live';detail.open=true;const sum=document.createElement('summary');sum.textContent='图片识别中……';const pre=document.createElement('div');pre.className='mathout';pre.textContent='正在调用图片识别模型……';detail.append(sum,pre);const time=document.createElement('div');time.className='time';d.append(meta,detail,time);els.messages.appendChild(d);scroll();return{detail,sum,pre,time}}function setAssistantDone(card,reasoning,answer,elapsed){card.reason.classList.remove('live');if(reasoning.trim()){card.pre.textContent=reasoning.trim();card.reason.open=false;card.sum.textContent='完整思考过程（已折叠，点击展开）';renderMath(card.pre)}else card.reason.style.display='none';card.answer.textContent=answer||'(模型没有返回文本)';renderMath(card.answer);card.time.textContent='思考用时：'+fmt(elapsed);scroll()}function extractThink(text){const m=(text||'').match(/<think>([\s\S]*?)<\/think>/i);if(!m)return{reasoning:'',answer:text||''};return{reasoning:m[1].trim(),answer:text.replace(m[0],'').trim()}}function fileToDataUrl(f){return new Promise((ok,fail)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=fail;r.readAsDataURL(f)})}async function handleImages(files){for(const f of Array.from(files||[])){if(!f.type.startsWith('image/'))continue;selectedImages.push({id:Date.now()+Math.random(),name:f.name,dataUrl:await fileToDataUrl(f)})}els.imageInput.value='';renderImages()}function renderImages(){els.preview.innerHTML='';els.imageInfo.textContent=selectedImages.length?'已选择 '+selectedImages.length+' 张图片':'未选择图片';for(const img of selectedImages){const w=document.createElement('div');w.className='thumb';const im=document.createElement('img');im.src=img.dataUrl;im.alt=img.name;const x=document.createElement('button');x.type='button';x.textContent='×';x.onclick=()=>{selectedImages=selectedImages.filter(v=>v.id!==img.id);renderImages()};w.append(im,x);els.preview.appendChild(w)}}function clearImages(){selectedImages=[];els.imageInput.value='';renderImages()}async function analyzeImages(text,images=selectedImages){if(!images.length)return'';if(!els.visionModel.value)throw new Error('你上传了图片，但没有选择图片识别模型。');const start=performance.now(),ocrCard=makeOcrCard();setStatus('正在调用图片识别模型……');const content=[{type:'text',text:'请详细识别这些图片内容，尽量保留可见文字、题目条件、图表关系和关键信息，供后续主模型回答使用。用户原始问题：'+(text||'无')}];for(const img of images)content.push({type:'image_url',image_url:{url:img.dataUrl}});try{const key=(els.ocrApiKey.value||els.apiKey.value).trim();const d=await api('/v1/chat/completions',{method:'POST',body:JSON.stringify({model:els.visionModel.value,messages:[{role:'user',content}],temperature:.2})},ocrBase(),key);const out=d.choices?.[0]?.message?.content||d.choices?.[0]?.text||'';ocrCard.detail.classList.remove('live');ocrCard.pre.textContent=out||'(图片识别模型没有返回文本)';renderMath(ocrCard.pre);ocrCard.detail.open=false;ocrCard.sum.textContent='图片 OCR / 识别结果（已折叠，点击展开）';ocrCard.time.textContent='OCR/识别用时：'+fmt(performance.now()-start);scroll();return out}catch(e){ocrCard.detail.classList.remove('live');ocrCard.pre.textContent='图片识别失败：'+e.message;ocrCard.sum.textContent='图片 OCR / 识别失败';ocrCard.time.textContent='OCR/识别用时：'+fmt(performance.now()-start);throw e}}async function chatNormal(messages){const d=await api('/v1/chat/completions',{method:'POST',body:JSON.stringify({model:els.chatModel.value,messages,temperature:.7})});const msg=d.choices?.[0]?.message||{};let reasoning=msg.reasoning_content||msg.reasoning||d.choices?.[0]?.reasoning_content||'',answer=msg.content||d.choices?.[0]?.text||'';if(!reasoning&&/<think>/i.test(answer)){const p=extractThink(answer);reasoning=p.reasoning;answer=p.answer}return{reasoning,answer}}async function chatStream(messages,card){if(!base())throw new Error('请填写 API 主机地址。');if(!els.apiKey.value.trim())throw new Error('请填写 API Key。');const r=await fetch(base()+'/v1/chat/completions',{method:'POST',headers:authHeaders({'Accept':'text/event-stream'}),body:JSON.stringify({model:els.chatModel.value,messages,temperature:.7,stream:true})});if(!r.ok||!r.body){const txt=await r.text();throw new Error(txt||('HTTP '+r.status))}const reader=r.body.getReader(),decoder=new TextDecoder('utf-8');let buf='',reasoning='',answer='',contentAll='';function apply(){if(reasoning){card.pre.textContent=tailText(reasoning);card.sum.textContent='思考中（仅显示最新几行）';card.reason.style.display='block'}card.answer.textContent=answer||'正在思考……';scroll()}while(true){const{done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});const lines=buf.split(/\r?\n/);buf=lines.pop()||'';for(const line of lines){const s=line.trim();if(!s||!s.startsWith('data:'))continue;const payload=s.slice(5).trim();if(payload==='[DONE]')return{reasoning,answer};let data;try{data=JSON.parse(payload)}catch{continue}const delta=data.choices?.[0]?.delta||{},msg=data.choices?.[0]?.message||{},rc=delta.reasoning_content||delta.reasoning||msg.reasoning_content||'',c=delta.content||msg.content||data.choices?.[0]?.text||'';if(rc)reasoning+=rc;else if(c){contentAll+=c;if(!reasoning&&/<think>/i.test(contentAll)){if(/<\/think>/i.test(contentAll)){const p=extractThink(contentAll);reasoning=p.reasoning;answer=p.answer}else{card.pre.textContent=tailText(contentAll.replace(/<think>/i,''));card.answer.textContent='正在思考……';scroll();continue}}else answer+=c}apply()}}return{reasoning,answer}}async function send(){const text=els.prompt.value.trim();if(!text&&!selectedImages.length)return;if(!els.chatModel.value){setStatus('请先选择主对话模型。');return}const submittedImages=[...selectedImages];els.sendBtn.disabled=true;bubble('user',(text||'[图片]')+(submittedImages.length?'\n\n已附加图片：'+submittedImages.map(x=>x.name).join('，'):''));els.prompt.value='';if(submittedImages.length)clearImages();const card=makeAssistantCard(),start=performance.now();try{let imageReport='';if(submittedImages.length)imageReport=await analyzeImages(text,submittedImages);const messages=[];const sys=getInjectedSystemPrompt();if(sys)messages.push({role:'system',content:sys});for(const m of history.slice(-20)){if(m.role==='user'||m.role==='assistant')messages.push({role:m.role,content:m.content})}let finalText=text;if(imageReport)finalText+='\n\n[图片 OCR / 识别结果]\n'+imageReport;messages.push({role:'user',content:finalText});setStatus('正在调用主对话模型……');let result;try{result=await chatStream(messages,card)}catch(streamErr){setStatus('流式请求失败，正在退回普通请求……\n'+streamErr.message);result=await chatNormal(messages)}if(!result.reasoning&&/<think>/i.test(result.answer)){const p=extractThink(result.answer);result.reasoning=p.reasoning;result.answer=p.answer}setAssistantDone(card,result.reasoning||'',result.answer||'',performance.now()-start);history.push({role:'assistant',content:result.answer||''});saveLocal();setStatus('完成。',true)}catch(e){setAssistantDone(card,'','请求失败：'+e.message,performance.now()-start);history.push({role:'assistant',content:'请求失败：'+e.message});setStatus('请求失败：'+e.message)}finally{els.sendBtn.disabled=false}}
els.loadModels.onclick=loadModels;els.saveSettings.onclick=()=>{saveLocal();setStatus('设置已保存到本机浏览器。',true)};els.chatModel.onchange=()=>{updatePill();saveLocal()};els.visionModel.onchange=saveLocal;els.ocrBaseUrl.onchange=saveLocal;els.ocrApiKey.onchange=saveLocal;els.systemPrompt.onchange=saveLocal;els.englishMode.onchange=()=>{saveLocal();setStatus(els.englishMode.checked?'英语阅读处理模式已启用，专用长提示词会在后台注入。':'英语阅读处理模式已关闭，将使用上方系统提示词。',true)};els.imageInput.onchange=e=>handleImages(e.target.files);els.clearImages.onclick=clearImages;els.sendBtn.onclick=send;els.prompt.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};els.toggleSettings.onclick=()=>els.app.classList.add('settings-mode');els.backChat.onclick=()=>els.app.classList.remove('settings-mode');els.clearChat.onclick=()=>{if(confirm('确定清空当前对话吗？')){history=[];render()}};els.exportChat.onclick=()=>{const blob=new Blob([JSON.stringify(history,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='mozhi-aichat-history.json';a.click();URL.revokeObjectURL(url)};loadLocal();
</script>
